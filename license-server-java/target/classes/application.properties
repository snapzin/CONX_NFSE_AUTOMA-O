server.port=${PORT:8080}

# Banco H2 em arquivo (persiste entre reinicializacoes)
# Para Railway: adicione um volume em /app/data
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/licenses;AUTO_SERVER=TRUE}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Credenciais do painel admin
admin.user=${ADMIN_USER:admin}
admin.pass=${ADMIN_PASS:admin}

# Segredo do cliente (app Electron). Deixe vazio para desabilitar.
client.secret=${CLIENT_SECRET:}

# Chaves legadas (compatibilidade, separadas por virgula)
valid.keys=${VALID_KEYS:}
