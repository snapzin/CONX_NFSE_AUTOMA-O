<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NFSe Automacao</title>
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #05080f;
      }

      body {
        display: grid;
        place-items: center;
        -webkit-app-region: drag;
      }

      .splash-video {
        width: 100vw;
        height: 100vh;
        object-fit: contain;
        background: #05080f;
        animation: fadeIn 260ms ease-out both;
        pointer-events: none;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
        }

        to {
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <video
      class="splash-video"
      src="./assets/automacoes_loading.mp4"
      autoplay
      muted
      loop
      playsinline
    ></video>
  </body>
</html>
