<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NFSe Automacao</title>

  <!-- CSS -->
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/sidebar.css">
  <link rel="stylesheet" href="css/cards.css">
  <link rel="stylesheet" href="css/logs.css">
  <link rel="stylesheet" href="css/toast.css">
  <link rel="stylesheet" href="css/splash.css">
</head>
<body>
  <div id="root">
    <!-- Splash screen (sobreposição inicial) -->
    <div id="splash" class="splash-container">
      <div class="splash-logo">
        <div class="splash-logo-text">NFSe</div>
        <div class="splash-subtitle">Automacao · v2.3</div>
      </div>
      <div class="splash-bar-wrapper">
        <div class="splash-bar-fill"></div>
      </div>
      <div class="splash-text">Inicializando...</div>
    </div>

    <!-- App principal (oculto durante splash) -->
    <div id="app" style="display: none;">
      <!-- Sidebar -->
      <sidebar id="sidebar">
        <div class="sidebar-header">
          <div class="logo">NFSe</div>
          <div class="version">Automacao · v2.3</div>
        </div>
        <nav class="sidebar-nav">
          <button class="nav-btn active" data-page="executar">
            <span class="nav-icon">▶</span>
            <span class="nav-label">Executar</span>
          </button>
          <button class="nav-btn" data-page="config">
            <span class="nav-icon">⚙</span>
            <span class="nav-label">Configurações</span>
          </button>
          <button class="nav-btn" data-page="sobre">
            <span class="nav-icon">ℹ</span>
            <span class="nav-label">Sobre</span>
          </button>
        </nav>
        <div class="sidebar-footer">
          <div class="theme-label">Tema</div>
          <div class="theme-selector">
            <button class="theme-btn active" data-theme="dark">Escuro</button>
            <button class="theme-btn" data-theme="light">Claro</button>
          </div>
        </div>
      </sidebar>

      <!-- Área principal -->
      <div class="main-area">
        <!-- Topbar -->
        <topbar class="topbar">
          <h1 id="page-title">Executar</h1>
          <div class="topbar-status">
            <span class="status-badge"></span>
            <span id="status-text">Pronto</span>
          </div>
        </topbar>

        <!-- Container de páginas -->
        <div id="page-container" class="page-container">
          <!-- Página: Executar -->
          <page id="page-executar" class="page active">
            <div class="page-content"></div>
          </page>

          <!-- Página: Configurações -->
          <page id="page-config" class="page">
            <div class="page-content"></div>
          </page>

          <!-- Página: Sobre -->
          <page id="page-sobre" class="page">
            <div class="page-content"></div>
          </page>
        </div>

        <!-- Status bar -->
        <statusbar class="statusbar">
          <span id="statusbar-text">Pronto para executar.</span>
        </statusbar>
      </div>
    </div>

    <!-- Container de toasts -->
    <div id="toast-container"></div>
  </div>

  <!-- JavaScript -->
  <script src="js/api.js"></script>
  <script src="js/toasts.js"></script>
  <script src="js/splash.js"></script>
  <script src="js/page-executar.js"></script>
  <script src="js/page-config.js"></script>
  <script src="js/page-sobre.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
